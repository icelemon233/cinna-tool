<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232db5b5'/%3E%3Cpath d='M42 22c-2.8-3.1-6.1-4.6-10.1-4.6-8 0-14 6.2-14 14.7 0 8.3 5.9 14.5 14.1 14.5 4.2 0 7.6-1.6 10.4-4.9l-4.4-4.1c-1.7 1.9-3.5 2.8-5.9 2.8-4.4 0-7.4-3.3-7.4-8.3 0-5.1 3-8.5 7.4-8.5 2.3 0 4.2.9 5.7 2.7L42 22z' fill='white'/%3E%3C/svg%3E" />
    <title>CinnaTool</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #fbfbfa;
      }

      .startup-skeleton {
        display: flex;
        width: 100%;
        height: 100%;
        background: #e4e4e0;
        color: transparent;
      }

      .startup-skeleton__sidebar {
        box-sizing: border-box;
        display: flex;
        width: 236px;
        flex: 0 0 236px;
        flex-direction: column;
        gap: 14px;
        padding: 72px 18px 18px;
      }

      .startup-skeleton__nav {
        height: 36px;
        border-radius: 9px;
      }

      .startup-skeleton__nav:nth-child(2) {
        width: 82%;
      }

      .startup-skeleton__nav:nth-child(3) {
        width: 90%;
      }

      .startup-skeleton__nav:nth-child(4) {
        width: 74%;
      }

      .startup-skeleton__settings {
        width: 68%;
        height: 36px;
        margin-top: auto;
        border-radius: 9px;
      }

      .startup-skeleton__main {
        box-sizing: border-box;
        display: flex;
        min-width: 0;
        flex: 1;
        flex-direction: column;
        gap: 22px;
        padding: 72px 32px 32px;
        border-left: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 18px 0 0 18px;
        background: #fbfbfa;
      }

      .startup-skeleton__title {
        width: min(280px, 48%);
        height: 28px;
        border-radius: 8px;
      }

      .startup-skeleton__subtitle {
        width: min(420px, 68%);
        height: 14px;
        border-radius: 7px;
      }

      .startup-skeleton__cards {
        display: grid;
        min-height: 0;
        flex: 1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .startup-skeleton__card {
        box-sizing: border-box;
        display: flex;
        min-height: 180px;
        flex-direction: column;
        gap: 16px;
        padding: 22px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 14px;
        background: #fff;
      }

      .startup-skeleton__line {
        width: 100%;
        height: 14px;
        border-radius: 7px;
      }

      .startup-skeleton__line:nth-child(2) {
        width: 76%;
      }

      .startup-skeleton__line:nth-child(3) {
        width: 88%;
      }

      .startup-skeleton__line:nth-child(4) {
        width: 62%;
      }

      .startup-skeleton__nav,
      .startup-skeleton__settings,
      .startup-skeleton__title,
      .startup-skeleton__subtitle,
      .startup-skeleton__line {
        background: linear-gradient(90deg, #ddddda 25%, #eeeeeb 50%, #ddddda 75%);
        background-size: 200% 100%;
        animation: startup-skeleton-shimmer 1.35s ease-in-out infinite;
      }

      @keyframes startup-skeleton-shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }

      @media (max-width: 760px) {
        .startup-skeleton__sidebar {
          width: 84px;
          flex-basis: 84px;
          padding-inline: 12px;
        }

        .startup-skeleton__cards {
          grid-template-columns: 1fr;
        }

        .startup-skeleton__card:nth-child(2) {
          display: none;
        }
      }

      @media (max-width: 520px) {
        .startup-skeleton__sidebar {
          display: none;
        }

        .startup-skeleton__main {
          padding: 28px 20px 20px;
          border-left: 0;
          border-radius: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-skeleton * {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-skeleton" role="status" aria-label="CinnaTool 正在启动">
        <aside class="startup-skeleton__sidebar" aria-hidden="true">
          <div class="startup-skeleton__nav"></div>
          <div class="startup-skeleton__nav"></div>
          <div class="startup-skeleton__nav"></div>
          <div class="startup-skeleton__nav"></div>
          <div class="startup-skeleton__settings"></div>
        </aside>
        <main class="startup-skeleton__main" aria-hidden="true">
          <div class="startup-skeleton__title"></div>
          <div class="startup-skeleton__subtitle"></div>
          <div class="startup-skeleton__cards">
            <section class="startup-skeleton__card">
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
            </section>
            <section class="startup-skeleton__card">
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
              <div class="startup-skeleton__line"></div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
