appId: com.cinna.tools
productName: CinnaTool
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
electronVersion: 42.3.3
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
directories:
  output: release
afterPack: scripts/prune-electron-package.cjs
files:
  - dist/**/*
  - dist-renderer/**/*
  - package.json
extraResources:
  - from: "src/assets/icon.png"
    to: "assets/icon.png"
  - from: "src/assets/iconTemplate.png"
    to: "assets/iconTemplate.png"
  - from: "src/assets/trayTemplate.png"
    to: "assets/trayTemplate.png"
  - from: "src/assets/trayTemplate@2x.png"
    to: "assets/trayTemplate@2x.png"
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: src/assets/icon.icns
  extraResources:
    - from: "src/assets/icon.icns"
      to: "assets/icon.icns"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/assets/icon.ico
  extraResources:
    - from: "src/assets/icon.ico"
      to: "assets/icon.ico"
linux:
  target:
    - AppImage
    - deb
  icon: src/assets/icon.png
nsis:
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  installerIcon: src/assets/icon.ico
  uninstallerIcon: src/assets/icon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CinnaTool
