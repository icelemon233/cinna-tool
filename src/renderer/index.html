<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CinnaTool</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; overflow: hidden; }

      /* Theme CSS Variables */

      /* Default: Mint 薄荷 */
      :root,
      [data-theme='mint'] {
        --bg-primary: #D4F0F0;
        --bg-secondary: #b8e6e6;
        --bg-card: #ffffff;
        --bg-card-completed: #e8f8f8;
        --text-primary: #1a3a3a;
        --text-secondary: #3d6b6b;
        --text-muted: #7aabab;
        --border-color: #a8d8d8;
        --accent: #2db5b5;
        --accent-light: rgba(45, 181, 181, 0.12);
        --topbar-text: #1a3a3a;
        --topbar-bg: #ffffff;
        --input-bg: #f0fafa;
        --btn-inactive-bg: #e0f5f5;
        --btn-inactive-text: #3d6b6b;
        --btn-hover-bg: rgba(45, 181, 181, 0.12);
        --sidebar-bg: #1a3a3a;
        --sidebar-text: #d4f0f0;
        --sidebar-active-bg: rgba(45, 181, 181, 0.2);
      }

      [data-theme='peach'] {
        --bg-primary: #FFDFD3;
        --bg-secondary: #ffcbb8;
        --bg-card: #ffffff;
        --bg-card-completed: #fff0ea;
        --text-primary: #3d2017;
        --text-secondary: #6b4030;
        --text-muted: #ab7a6a;
        --border-color: #f0c4b0;
        --accent: #e87040;
        --accent-light: rgba(232, 112, 64, 0.12);
        --topbar-text: #3d2017;
        --topbar-bg: #ffffff;
        --input-bg: #fff8f5;
        --btn-inactive-bg: #ffede5;
        --btn-inactive-text: #6b4030;
        --btn-hover-bg: rgba(232, 112, 64, 0.12);
        --sidebar-bg: #3d2017;
        --sidebar-text: #ffdfd3;
        --sidebar-active-bg: rgba(232, 112, 64, 0.2);
      }

      [data-theme='sakura'] {
        --bg-primary: #FCEFF9;
        --bg-secondary: #f5d8ef;
        --bg-card: #ffffff;
        --bg-card-completed: #fdf5fb;
        --text-primary: #3d1735;
        --text-secondary: #6b3060;
        --text-muted: #ab70a0;
        --border-color: #e8b8e0;
        --accent: #d44fa0;
        --accent-light: rgba(212, 79, 160, 0.12);
        --topbar-text: #3d1735;
        --topbar-bg: #ffffff;
        --input-bg: #fef8fc;
        --btn-inactive-bg: #fce8f8;
        --btn-inactive-text: #6b3060;
        --btn-hover-bg: rgba(212, 79, 160, 0.12);
        --sidebar-bg: #3d1735;
        --sidebar-text: #fceff9;
        --sidebar-active-bg: rgba(212, 79, 160, 0.2);
      }

      [data-theme='lavender'] {
        --bg-primary: #E2DFFF;
        --bg-secondary: #ccc8f0;
        --bg-card: #ffffff;
        --bg-card-completed: #f0eeff;
        --text-primary: #1f1a40;
        --text-secondary: #3d3570;
        --text-muted: #7a70b0;
        --border-color: #c4bef0;
        --accent: #6b5ce7;
        --accent-light: rgba(107, 92, 231, 0.12);
        --topbar-text: #1f1a40;
        --topbar-bg: #ffffff;
        --input-bg: #f5f3ff;
        --btn-inactive-bg: #ece8ff;
        --btn-inactive-text: #3d3570;
        --btn-hover-bg: rgba(107, 92, 231, 0.12);
        --sidebar-bg: #1f1a40;
        --sidebar-text: #e2dfff;
        --sidebar-active-bg: rgba(107, 92, 231, 0.2);
      }

      [data-theme='lemon'] {
        --bg-primary: #FFFACD;
        --bg-secondary: #f5eda0;
        --bg-card: #ffffff;
        --bg-card-completed: #fffde8;
        --text-primary: #3d3510;
        --text-secondary: #6b5f20;
        --text-muted: #ab9f50;
        --border-color: #e8e0a0;
        --accent: #c5a800;
        --accent-light: rgba(197, 168, 0, 0.12);
        --topbar-text: #3d3510;
        --topbar-bg: #ffffff;
        --input-bg: #fffef5;
        --btn-inactive-bg: #fff8d0;
        --btn-inactive-text: #6b5f20;
        --btn-hover-bg: rgba(197, 168, 0, 0.12);
        --sidebar-bg: #3d3510;
        --sidebar-text: #fffacd;
        --sidebar-active-bg: rgba(197, 168, 0, 0.2);
      }

      [data-theme='dark'] {
        --bg-primary: #1a1a1a;
        --bg-secondary: #252525;
        --bg-card: #2a2a2a;
        --bg-card-completed: #222222;
        --text-primary: #ffffff;
        --text-secondary: #cccccc;
        --text-muted: #888888;
        --border-color: #3a3a3a;
        --accent: #ffffff;
        --accent-light: rgba(255, 255, 255, 0.08);
        --topbar-text: #ffffff;
        --topbar-bg: #1a1a1a;
        --input-bg: #2a2a2a;
        --btn-inactive-bg: #333333;
        --btn-inactive-text: #cccccc;
        --btn-hover-bg: rgba(255, 255, 255, 0.08);
        --sidebar-bg: #111111;
        --sidebar-text: #ffffff;
        --sidebar-active-bg: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
